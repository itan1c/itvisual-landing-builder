<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лендинг</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: #1a1a2e;
            line-height: 1.6;
        }
    </style>
</head>

<body>

    <section data-block="hero"
        style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; text-align: center; padding: 120px 40px;">
        <h1 style="font-size: 3rem; font-weight: 900; margin-bottom: 20px; line-height: 1.1;">Заголовок вашего сайта
        </h1>
        <p
            style="font-size: 1.2rem; margin-bottom: 48px; opacity: 0.9; max-width: 560px; margin-left: auto; margin-right: auto;">
            Опишите ваше предложение здесь. Что получит клиент? Почему стоит обратиться именно к вам?</p>
        <a href="#contact"
            style="background: white; color: #667eea; padding: 18px 52px; border-radius: 50px; text-decoration: none; font-weight: 700; font-size: 1.1rem; display: inline-block; box-shadow: 0 20px 60px rgba(0,0,0,0.2);">Получить
            →</a>
    </section>

    <section data-block="contact" id="contact" style="background: #f8f9ff; padding: 100px 40px; text-align: center;">
        <h2 style="font-size: 2rem; font-weight: 800; margin-bottom: 16px; color: #1a1a2e;">Свяжитесь с нами</h2>
        <p style="color: #666; margin-bottom: 48px; font-size: 1.05rem;">Оставьте заявку и мы перезвоним вам в течение
            15 минут</p>
        <form action="order.php" method="post"
            style="max-width: 420px; margin: 0 auto; display: flex; flex-direction: column; gap: 16px;">
            <input type="text" name="name" placeholder="Ваше имя"
                style="width: 100%; padding: 16px 22px; border: 2px solid #e8e8f0; border-radius: 12px; font-size: 1rem; font-family: inherit; outline: none; color: #1a1a2e;">
            <input type="tel" name="phone" placeholder="Ваш телефон"
                style="width: 100%; padding: 16px 22px; border: 2px solid #e8e8f0; border-radius: 12px; font-size: 1rem; font-family: inherit; outline: none; color: #1a1a2e;">
            <button type="submit"
                style="width: 100%; padding: 18px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 700; font-family: inherit; cursor: pointer;">Отправить
                заявку</button>
        </form>
    </section>

</body>

</html>
