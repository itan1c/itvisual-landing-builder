<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пройти квіз</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #667eea;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .quiz-card {
            background: #fff;
            color: #111;
            padding: 50px;
            border-radius: 24px;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .option {
            display: block;
            padding: 18px;
            border: 2px solid #eee;
            border-radius: 12px;
            margin-bottom: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .option:hover {
            border-color: #667eea;
            background: #f5f7ff;
        }
    </style>
</head>

<body>
    <section data-block="quiz">
        <div class="quiz-card">
            <h2 style="font-size:2rem; font-weight:800; margin-bottom:16px;">Дізнайтеся вартість послуги</h2>
            <p style="color:#666; margin-bottom:40px;">Пройдіть короткий тест з 3 питань та отримайте знижку 10% на
                перше замовлення.</p>

            <div style="text-align:left;">
                <h3 style="margin-bottom:20px; font-size:1.2rem;">Що вас цікавить найбільше?</h3>
                <div class="option">Розробка сайту</div>
                <div class="option">Налаштування реклами</div>
                <div class="option">SEO просування</div>
            </div>

            <button
                style="background:#667eea; color:white; width:100%; padding:16px; border:none; border-radius:12px; margin-top:20px; font-weight:800; font-size:1.1rem; cursor:pointer;">Далі
                →</button>
        </div>
    </section>
</body>

</html>
