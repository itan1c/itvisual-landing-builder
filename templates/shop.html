<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Інтернет-магазин</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #f5f7fa;
            color: #333;
        }

        .product-hero {
            display: flex;
            max-width: 1000px;
            margin: 40px auto;
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .product-img {
            width: 50%;
            background: #eee;
            min-height: 400px;
        }

        .product-info {
            width: 50%;
            padding: 60px 40px;
        }

        .tag {
            display: inline-block;
            background: #ffeceb;
            color: #ff4a3d;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 800;
            margin-bottom: 16px;
        }

        .price {
            font-size: 2rem;
            font-weight: 800;
            color: #111;
            margin: 20px 0;
        }

        .old-price {
            text-decoration: line-through;
            color: #aaa;
            font-size: 1.2rem;
        }

        .buy-btn {
            display: block;
            text-align: center;
            background: #111;
            color: #fff;
            padding: 16px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 18px;
            margin-top: 30px;
            transition: 0.2s;
        }

        .buy-btn:hover {
            background: #333;
        }

        @media (max-width:768px) {
            .product-hero {
                flex-direction: column;
                margin: 15px;
            }

            .product-img,
            .product-info {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <section data-block="product" style="padding:20px;">
        <div class="product-hero">
            <div class="product-img">
                <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?auto=format&fit=crop&w=800&q=80"
                    style="width:100%; height:100%; object-fit:cover;" alt="Product">
            </div>
            <div class="product-info">
                <div class="tag">Хіт продажів</div>
                <h1 style="font-size:2.2rem; margin-bottom:10px;">Premium Навушники</h1>
                <p style="color:#666; font-size:1.1rem; line-height:1.6;">Ідеальний звук, стильний дизайн та активне
                    шумозаглушення для максимального комфорту.</p>
                <div class="price"><span class="old-price">4 500 грн</span> 2 999 грн</div>
                <form action="#" method="get" style="display:flex; flex-direction:column; gap:12px; margin-top:24px;">
                    <input type="text" placeholder="Ваше ім'я"
                        style="padding:14px; border:1px solid #ddd; border-radius:8px; font-size:16px;" required>
                    <input type="tel" placeholder="Номер телефону"
                        style="padding:14px; border:1px solid #ddd; border-radius:8px; font-size:16px;" required>
                    <button type="submit" class="buy-btn" style="border:none; cursor:pointer;">Замовити зараз</button>
                </form>
            </div>
        </div>
    </section>
</body>

</html>
