<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель Адміністратора | ITVisual</title>
    <link rel="stylesheet" href="css/editor.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0b0c10;
            color: #fff;
            margin: 0;
            overflow-y: auto !important;
            height: auto !important;
            display: block !important;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background: #15161a;
        }

        .container {
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .filters-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .filters-bar select {
            background: #1a1c23;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            cursor: pointer;
        }

        .stats-grid {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .stat-card {
            flex: 1;
            min-width: 220px;
            background: #15161a;
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 24px;
            border-radius: 12px;
        }

        .stat-card h3 {
            margin: 0 0 10px;
            color: #888;
            font-size: 14px;
            font-weight: 500;
        }

        .stat-card .value {
            font-size: 36px;
            font-weight: 800;
            color: #fff;
        }

        .stat-card .value span {
            font-size: 16px;
            color: #667eea;
            margin-left: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #15161a;
            border-radius: 12px;
            overflow: hidden;
        }

        th,
        td {
            padding: 16px 24px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        th {
            background: rgba(255, 255, 255, 0.02);
            color: #888;
            font-weight: 500;
            font-size: 14px;
        }

        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .badge.pro {
            background: rgba(102, 126, 234, 0.2);
            color: #667eea;
        }

        .badge.free {
            background: rgba(255, 255, 255, 0.1);
            color: #aaa;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(11, 12, 16, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            font-size: 20px;
            font-weight: bold;
            display: none;
        }

        .btn-toggle-plan {
            padding: 6px 14px;
            border-radius: 8px;
            border: none;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-toggle-plan.give-pro {
            background: rgba(102,126,234,0.15);
            color: #667eea;
        }
        .btn-toggle-plan.give-pro:hover {
            background: rgba(102,126,234,0.3);
        }
        .btn-toggle-plan.remove-pro {
            background: rgba(239,68,68,0.1);
            color: #ef4444;
        }
        .btn-toggle-plan.remove-pro:hover {
            background: rgba(239,68,68,0.2);
        }
    </style>
</head>

<body>
    <div class="header">
        <div
            style="font-weight: 800; font-size: 20px; display:flex; align-items:center; gap:10px;  letter-spacing:-0.5px;">
            ITVisual <span style="color:#667eea;">Admin</span>
        </div>
        <div>
            <a href="dashboard.html" style="color:#aaa; text-decoration:none;">Повернутись в Дашборд</a>
        </div>
    </div>

    <div class="container">
        <div class="filters-bar">
            <h2 style="margin: 0;">Статистика платформи</h2>
            <select id="period-filter">
                <option value="all">Увесь час</option>
                <option value="month">Останній місяць</option>
                <option value="week">Останній тиждень</option>
            </select>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>Загальний дохід (MRR)</h3>
                <div class="value"><span id="stat-mrr">0</span> <span style="font-size:20px;">грн</span></div>
            </div>
            <div class="stat-card">
                <h3>PRO-користувачі</h3>
                <div class="value" id="stat-pro">0</div>
            </div>
            <div class="stat-card">
                <h3>Всього акаунтів</h3>
                <div class="value" id="stat-users">0</div>
            </div>
            <div class="stat-card">
                <h3>Створено проєктів</h3>
                <div class="value" id="stat-projects">0</div>
            </div>
        </div>

        <h2 style="margin-bottom: 20px;">Нещодавні користувачі (Топ 50)</h2>
        <table>
            <thead>
                <tr>
                    <th>Email</th>
                    <th>Тариф</th>
                    <th>Дата реєстрації</th>
                    <th>Дії</th>
                </tr>
            </thead>
            <tbody id="users-table-body">
                <tr>
                    <td colspan="4" style="text-align:center; color:#888;">Завантаження...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="loading-overlay" id="loading">Завантаження даних...</div>

    <script>
        let currentUser = null;
        try { currentUser = JSON.parse(localStorage.getItem('ve_user')); } catch (e) { }

        if (!currentUser || !currentUser.token) {
            window.location.href = 'login.html';
        }

        const filterEl = document.getElementById('period-filter');
        filterEl.addEventListener('change', () => loadAdminData());

        async function loadAdminData() {
            document.getElementById('loading').style.display = 'flex';
            const period = filterEl.value;

            try {
                const res = await fetch(`/api/admin/stats?period=${period}`, {
                    headers: { 'Authorization': 'Bearer ' + currentUser.token }
                });

                if (!res.ok) {
                    if (res.status === 401 || res.status === 403) {
                        alert("Доступ заборонено. Тільки для адміністраторів.");
                        window.location.href = 'dashboard.html';
                        return;
                    }
                    throw new Error('Помилка завантаження');
                }

                const data = await res.json();

                // Update stats
                document.getElementById('stat-mrr').textContent = data.stats.mrr.toLocaleString();
                document.getElementById('stat-pro').textContent = data.stats.proUsers.toLocaleString();
                document.getElementById('stat-users').textContent = data.stats.totalUsers.toLocaleString();
                document.getElementById('stat-projects').textContent = data.stats.projectsCount.toLocaleString();

                // Update table
                const tbody = document.getElementById('users-table-body');
                tbody.innerHTML = '';

                if (data.recentUsers.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:#888;">Не знайдено користувачів</td></tr>';
                }

                data.recentUsers.forEach(user => {
                    const row = document.createElement('tr');

                    const isPro = user.plan && user.plan.toUpperCase() === 'PRO';
                    const planBadge = isPro
                        ? '<span class="badge pro">PRO</span>'
                        : '<span class="badge free">Free</span>';

                    const date = new Date(user.created_at).toLocaleString('uk-UA', {
                        day: '2-digit', month: '2-digit', year: 'numeric',
                        hour: '2-digit', minute: '2-digit'
                    });

                    const toggleBtn = isPro
                        ? `<button class="btn-toggle-plan remove-pro" onclick="togglePlan('${user.email}','free')">Забрати PRO</button>`
                        : `<button class="btn-toggle-plan give-pro" onclick="togglePlan('${user.email}','PRO')">Видати PRO на 30 днів</button>`;

                    row.innerHTML = `
                        <td style="font-weight: 500;">${user.email}</td>
                        <td>${planBadge}</td>
                        <td>${date}</td>
                        <td>${toggleBtn}</td>
                    `;
                    tbody.appendChild(row);
                });

            } catch (err) {
                console.error(err);
                alert("Не вдалося завантажити дані адміністратора.");
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        async function togglePlan(email, newPlan) {
            if (!confirm(`Змінити план для ${email} на ${newPlan}?`)) return;
            try {
                const res = await fetch('/api/admin/set-plan', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + currentUser.token,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, plan: newPlan })
                });
                const data = await res.json();
                if (data.success) {
                    loadAdminData(); // Refresh table
                } else {
                    alert(data.error || 'Помилка');
                }
            } catch (e) {
                alert('Помилка з\'єднання');
            }
        }

        // Initial load
        loadAdminData();
    </script>
</body>

</html>
