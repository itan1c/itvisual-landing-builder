<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin | ITVisual</title>
<link rel="stylesheet" href="css/editor.css">
<style>
* { box-sizing: border-box; }
body { font-family: 'Inter', sans-serif; background: #0b0c10; color: #fff; margin: 0; overflow-y: auto !important; height: auto !important; display: block !important; }
a { color: inherit; text-decoration: none; }

.header { display: flex; justify-content: space-between; align-items: center; padding: 16px 32px; border-bottom: 1px solid rgba(255,255,255,0.06); background: #15161a; }
.header-logo { font-weight: 800; font-size: 18px; letter-spacing: -0.5px; }
.header-logo span { color: #667eea; }
.header-nav a { color: #aaa; font-size: 14px; }
.header-nav a:hover { color: #fff; }

.container { padding: 32px; max-width: 1400px; margin: 0 auto; }

.toolbar { display: flex; gap: 12px; align-items: center; margin-bottom: 28px; flex-wrap: wrap; }
.toolbar h2 { margin: 0; font-size: 20px; flex: 1; }
.toolbar select, .toolbar input[type=text] {
    background: #1a1c23; color: #fff; border: 1px solid rgba(255,255,255,0.1);
    padding: 8px 14px; border-radius: 8px; font-size: 13px; outline: none;
}
.toolbar input[type=text] { width: 220px; }
.toolbar input[type=text]::placeholder { color: #555; }
.btn-refresh { background: rgba(102,126,234,0.15); color: #667eea; border: none; padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
.btn-refresh:hover { background: rgba(102,126,234,0.3); }

.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 32px; }
.stat-card { background: #15161a; border: 1px solid rgba(255,255,255,0.06); padding: 20px 24px; border-radius: 12px; }
.stat-card h3 { margin: 0 0 8px; color: #666; font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
.stat-card .val { font-size: 32px; font-weight: 800; color: #fff; line-height: 1; }
.stat-card .sub { font-size: 12px; color: #555; margin-top: 6px; }
.stat-card.green .val { color: #34d399; }
.stat-card.blue .val { color: #667eea; }
.stat-card.orange .val { color: #f59e0b; }
.stat-card.red .val { color: #ef4444; }

.section-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; color: #ccc; }

.table-wrap { background: #15161a; border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; overflow: hidden; margin-bottom: 32px; }
table { width: 100%; border-collapse: collapse; }
th, td { padding: 12px 20px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 13px; }
th { background: rgba(255,255,255,0.02); color: #555; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(255,255,255,0.02); }

.badge { padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 700; display: inline-block; }
.badge.pro { background: rgba(102,126,234,0.2); color: #667eea; }
.badge.free { background: rgba(255,255,255,0.07); color: #777; }
.badge.expired { background: rgba(239,68,68,0.15); color: #ef4444; }

.expiry-ok { color: #34d399; font-size: 12px; }
.expiry-soon { color: #f59e0b; font-size: 12px; }
.expiry-expired { color: #ef4444; font-size: 12px; }
.expiry-none { color: #444; font-size: 12px; }

.actions { display: flex; gap: 6px; flex-wrap: wrap; }
.btn-sm { padding: 5px 11px; border-radius: 6px; border: none; font-size: 11px; font-weight: 700; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.btn-give-pro { background: rgba(102,126,234,0.15); color: #667eea; }
.btn-give-pro:hover { background: rgba(102,126,234,0.3); }
.btn-remove-pro { background: rgba(239,68,68,0.1); color: #ef4444; }
.btn-remove-pro:hover { background: rgba(239,68,68,0.25); }
.btn-extend { background: rgba(52,211,153,0.1); color: #34d399; }
.btn-extend:hover { background: rgba(52,211,153,0.25); }

.extend-row { display: none; gap: 8px; align-items: center; margin-top: 6px; }
.extend-row input { width: 70px; background: #0b0c10; color: #fff; border: 1px solid rgba(255,255,255,0.1); padding: 4px 8px; border-radius: 6px; font-size: 12px; outline: none; }
.extend-row button { background: #34d399; color: #000; border: none; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; cursor: pointer; }

.loading { position: fixed; inset: 0; background: rgba(11,12,16,0.85); display: flex; align-items: center; justify-content: center; z-index: 999; font-size: 16px; font-weight: 600; display: none; }

.empty-row td { text-align: center; color: #444; padding: 32px; }

.proj-count { color: #667eea; font-weight: 600; }
.last-active { color: #555; font-size: 12px; }
</style>
</head>
<body>
<div class="header">
    <div class="header-logo">ITVisual <span>Admin</span></div>
    <div class="header-nav">
        <a href="dashboard.html">Дашборд</a>
    </div>
</div>

<div class="container">
    <div class="toolbar">
        <h2>Статистика</h2>
        <input type="text" id="search-input" placeholder="Пошук по email..." oninput="debounceLoad()">
        <select id="period-filter" onchange="loadAdminData()">
            <option value="all">Увесь час</option>
            <option value="month">Останній місяць</option>
            <option value="week">Останній тиждень</option>
        </select>
        <button class="btn-refresh" onclick="loadAdminData()">Оновити</button>
    </div>

    <div class="stats-grid">
        <div class="stat-card green">
            <h3>MRR</h3>
            <div class="val"><span id="stat-mrr">0</span> <span style="font-size:14px;color:#34d399;">грн</span></div>
            <div class="sub">ARR: <span id="stat-arr">0</span> грн</div>
        </div>
        <div class="stat-card blue">
            <h3>PRO активних</h3>
            <div class="val" id="stat-pro">0</div>
            <div class="sub">Прострочених: <span id="stat-expired" style="color:#ef4444;">0</span></div>
        </div>
        <div class="stat-card">
            <h3>Всього акаунтів</h3>
            <div class="val" id="stat-users">0</div>
            <div class="sub">Нових сьогодні: <span id="stat-today" style="color:#34d399;">0</span></div>
        </div>
        <div class="stat-card">
            <h3>Проєктів</h3>
            <div class="val" id="stat-projects">0</div>
            <div class="sub">В середньому: <span id="stat-avg">0</span> /user</div>
        </div>
    </div>

    <div class="section-title">Користувачі (до 100)</div>
    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>Email</th>
                    <th>Тариф</th>
                    <th>Дійсний до</th>
                    <th>Проєктів</th>
                    <th>Остання активність</th>
                    <th>Реєстрація</th>
                    <th>Дії</th>
                </tr>
            </thead>
            <tbody id="users-tbody">
                <tr class="empty-row"><td colspan="7">Завантаження...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<div class="loading" id="loading">Завантаження...</div>

<script>
let currentUser = null;
try { currentUser = JSON.parse(localStorage.getItem('ve_user')); } catch(e) {}
if (!currentUser?.token) window.location.href = 'login.html';

let debounceTimer;
function debounceLoad() { clearTimeout(debounceTimer); debounceTimer = setTimeout(loadAdminData, 400); }

function fmtDate(val) {
    if (!val) return '<span class="expiry-none">—</span>';
    const d = new Date(typeof val === 'number' ? val * 1000 : val);
    return d.toLocaleDateString('uk-UA', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
}

function fmtExpiry(ts, plan, serverTime) {
    if (!ts || plan?.toUpperCase() !== 'PRO') return '<span class="expiry-none">—</span>';
    const diff = ts - serverTime;
    const days = Math.ceil(diff / 86400);
    const dateStr = new Date(ts * 1000).toLocaleDateString('uk-UA', { day:'2-digit', month:'2-digit', year:'numeric' });
    if (diff <= 0) return `<span class="expiry-expired">Прострочено (${dateStr})</span>`;
    if (days <= 5) return `<span class="expiry-soon">${days}д (${dateStr})</span>`;
    return `<span class="expiry-ok">${days}д (${dateStr})</span>`;
}

function planBadge(plan, expires, serverTime) {
    if (!plan || plan.toUpperCase() !== 'PRO') return '<span class="badge free">Free</span>';
    if (expires && expires <= serverTime) return '<span class="badge expired">PRO (прострочено)</span>';
    return '<span class="badge pro">PRO</span>';
}

async function loadAdminData() {
    document.getElementById('loading').style.display = 'flex';
    const period = document.getElementById('period-filter').value;
    const search = document.getElementById('search-input').value;
    try {
        const res = await fetch(`/api/admin/stats?period=${period}&search=${encodeURIComponent(search)}`, {
            headers: { 'Authorization': 'Bearer ' + currentUser.token }
        });
        if (!res.ok) {
            if (res.status === 401 || res.status === 403) { alert('Доступ заборонено'); window.location.href = 'dashboard.html'; return; }
            throw new Error('Помилка сервера');
        }
        const data = await res.json();
        const s = data.stats;
        const st = data.serverTime;

        document.getElementById('stat-mrr').textContent      = s.mrr.toLocaleString();
        document.getElementById('stat-arr').textContent      = s.arr.toLocaleString();
        document.getElementById('stat-pro').textContent      = s.proUsers;
        document.getElementById('stat-expired').textContent  = s.expiredPro;
        document.getElementById('stat-users').textContent    = s.totalUsers;
        document.getElementById('stat-today').textContent    = s.newToday;
        document.getElementById('stat-projects').textContent = s.projectsCount;
        document.getElementById('stat-avg').textContent      = s.avgProjects;

        const tbody = document.getElementById('users-tbody');
        tbody.innerHTML = '';
        if (!data.recentUsers.length) {
            tbody.innerHTML = '<tr class="empty-row"><td colspan="7">Користувачів не знайдено</td></tr>';
        } else {
            data.recentUsers.forEach(u => {
                const tr = document.createElement('tr');
                const isPro = u.plan?.toUpperCase() === 'PRO';
                tr.innerHTML = `
                    <td style="font-weight:600;">${u.email}</td>
                    <td>${planBadge(u.plan, u.plan_expires_at, st)}</td>
                    <td>${fmtExpiry(u.plan_expires_at, u.plan, st)}</td>
                    <td class="proj-count">${u.project_count || 0}</td>
                    <td class="last-active">${u.last_project_at ? fmtDate(u.last_project_at) : '—'}</td>
                    <td style="color:#555;font-size:12px;">${fmtDate(u.created_at)}</td>
                    <td>
                        <div class="actions">
                            ${isPro
                                ? `<button class="btn-sm btn-remove-pro" onclick="setPlan('${u.email}','free')">Забрати PRO</button>`
                                : `<button class="btn-sm btn-give-pro" onclick="setPlan('${u.email}','PRO')">Дати PRO 30д</button>`
                            }
                            <button class="btn-sm btn-extend" onclick="toggleExtend('${u.email}')">+Днів</button>
                        </div>
                        <div class="extend-row" id="ext-${u.email.replace(/[@.]/g,'_')}">
                            <input type="number" min="1" max="365" value="30" placeholder="днів">
                            <button onclick="extendPlan('${u.email}', this)">OK</button>
                        </div>
                    </td>`;
                tbody.appendChild(tr);
            });
        }
    } catch(e) {
        alert('Помилка: ' + e.message);
    } finally {
        document.getElementById('loading').style.display = 'none';
    }
}

function toggleExtend(email) {
    const row = document.getElementById('ext-' + email.replace(/[@.]/g,'_'));
    if (row) row.style.display = row.style.display === 'flex' ? 'none' : 'flex';
}

async function extendPlan(email, btn) {
    const input = btn.previousElementSibling;
    const days = parseInt(input.value) || 30;
    if (!confirm(`Продовжити PRO для ${email} на ${days} днів?`)) return;
    try {
        const res = await fetch('/api/admin/set-plan', {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + currentUser.token, 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, plan: 'PRO', days })
        });
        const d = await res.json();
        if (d.success) { loadAdminData(); } else { alert(d.error || 'Помилка'); }
    } catch(e) { alert('Помилка зʼєднання'); }
}

async function setPlan(email, plan) {
    if (!confirm(`Змінити план для ${email} на ${plan}?`)) return;
    try {
        const res = await fetch('/api/admin/set-plan', {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + currentUser.token, 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, plan })
        });
        const d = await res.json();
        if (d.success) { loadAdminData(); } else { alert(d.error || 'Помилка'); }
    } catch(e) { alert('Помилка зʼєднання'); }
}

loadAdminData();
</script>
</body>
</html>
